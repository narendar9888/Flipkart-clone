<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar  -->
     <nav>
        <div id="nav">

            <!-- logo -->

            <div id="nav1">
                <span id="logo_name1">
                    Flipkart
                </span>
                <div id="nav1-2">
                    <span id="logo_name2">
                        Explore
                    </span>
                    <span id="logo_name3">
                        Plus 
                    </span>
                    <img src="assents/flipkart_logo.svg" alt="logo" style="width: 20px; height: 20px; background-image: transparent;">
                </div>

            <!-- search bar -->  

            </div>
            <div id="nev2" style="display: flex; align-items: center;">
                <span>
                    <img src="assents/search.svg" alt="search" style="width: 20px; height: 20px;">
                </span>
                <span>
                    <input type="text" placeholder="Search for products, brand and more ... " id="search-input">
                </span>
            </div>

            <!-- Become a Seller -->

            <div id="nav3" style="display: flex; align-items: center;">
                <span>
                    <img src="assents/shop-svg.svg" alt="Seller" style="width: 20px; height: 20px;">
                </span>
                <span id="Seller"> 
                        Become a Seller
                </span>
            </div>

            <!-- Sign in -->

            <div id="nav4" style="display: flex; align-items: center;">
                <span>
                    <img src="assents/person.svg" alt="Sign in" style="width: 20px; height: 20px;">
                </span>
                <span id="signin">
                        Sign in
                </span>
            </div>

            <!-- Cart -->

            <div id="nav5" style="display: flex; align-items: center;">
                <span>
                    <img src="assents/cart.svg" alt="cart" style="width: 20px; height: 20px;">
                </span>
                <span>
                        Cart
                </span>
            </div>
        </div>
     </nav>
</body>
<script src="script.js"></script>
</html>
